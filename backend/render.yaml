services:
  - type: web
    name: insightmeet-api
    runtime: python
    plan: starter
    buildCommand: "pip install -r requirements.txt"
    startCommand: "uvicorn app.main:app --host 0.0.0.0 --port $PORT"
    healthCheckPath: /health
    envVars:
      - key: GROQ_API_KEY
        sync: false
      - key: SARVAM_API_KEY
        sync: false
      - key: MISTRAL_API_KEY
        sync: false
      - key: EMBEDDING_MODEL
        value: all-MiniLM-L6-v2
      - key: ALLOWED_ORIGINS
        value: https://your-app.vercel.app
      - key: PYTHON_VERSION
        value: 3.12.0
    # Uploads/transcripts/Chroma vectors are written to app/uploads on local
    # disk. Render's default disk is EPHEMERAL and wiped on every deploy or
    # restart. Attach a persistent disk (Render dashboard -> Disks) mounted
    # at the path below if you need documents to survive redeploys.
    disk:
      name: insightmeet-uploads
      mountPath: /opt/render/project/src/app/uploads
      sizeGB: 5
